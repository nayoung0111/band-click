<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLINK : for bands</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f7fb;
    --surface: #f2f2f7;
    --surface2: #e8e8f0;
    --accent: #3c41cd;
    --accent-light: rgba(60,65,205,0.08);
    --accent-mid: rgba(60,65,205,0.18);
    --accent2: #6b6ef5;
    --text: #111118;
    --text2: #444458;
    --muted: #9999b0;
    --border: #e2e2ee;
    --beat-glow: rgba(60,65,205,0.5);
    --danger: #e53935;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; overflow-x:hidden; }

  header {
    padding:1.2rem 1.5rem 1rem;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:0.5rem;
    background:var(--bg);
    position:sticky; top:0; z-index:100;
  }
  .logo-mark { width:32px; height:32px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .logo-mark svg { width:18px; height:18px; fill:white; }
  .logo-text { font-size:1.15rem; font-weight:900; color:var(--text); letter-spacing:-0.01em; }
  .logo-text span { color:var(--accent); }

  .app { max-width:460px; margin:0 auto; padding:1.5rem; }
  .screen { display:none; }
  .screen.active { display:block; }

  /* LOBBY */
  .lobby-hero { margin-bottom:2rem; padding-top:0.5rem; }
  .lobby-hero h1 { font-size:1.6rem; font-weight:900; color:var(--text); line-height:1.3; }
  .lobby-hero h1 span { color:var(--accent); }
  .lobby-hero p { font-size:0.85rem; color:var(--muted); margin-top:0.4rem; font-weight:400; }
  .lobby-section { margin-bottom:1.5rem; }
  .lobby-section-title { font-size:1rem; font-weight:600; color:var(--text); margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:2px solid var(--accent); display:inline-block; }
  .input-group { margin-bottom:0.75rem; }
  .input-group label { display:block; font-size:0.72rem; font-weight:600; color:var(--text2); margin-bottom:0.35rem; letter-spacing:0.02em; }
  input[type="text"] { width:100%; background:var(--surface); border:1.5px solid var(--border); color:var(--text); padding:0.85rem 1rem; font-size:0.95rem; font-family:'Noto Sans KR',sans-serif; font-weight:400; outline:none; border-radius:10px; transition:all 0.2s; }
  input[type="text"]:focus { border-color:var(--accent); background:var(--bg); box-shadow:0 0 0 3px var(--accent-light); }
  input[type="text"]::placeholder { color:var(--muted); }
  .btn { width:100%; padding:0.95rem; font-family:'Noto Sans KR',sans-serif; font-size:0.95rem; font-weight:700; border:none; cursor:pointer; border-radius:10px; transition:all 0.15s; margin-bottom:0.5rem; letter-spacing:0.01em; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:hover { background:#3035b8; box-shadow:0 4px 16px rgba(60,65,205,0.3); transform:translateY(-1px); }
  .btn-primary:active { transform:translateY(0); }
  .btn-secondary { background:var(--bg); color:var(--accent); border:1.5px solid var(--accent); }
  .btn-secondary:hover { background:var(--accent-light); }
  .lobby-divider { display:flex; align-items:center; gap:0.8rem; margin:1.8rem 0 1.5rem; color:var(--muted); font-size:0.8rem; font-weight:400; }
  .lobby-divider::before,.lobby-divider::after { content:''; flex:1; height:1px; background:var(--border); }

  /* ROOM */
  .room-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.2rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
  .room-name-display { font-size:1.3rem; font-weight:900; color:var(--text); }
  .room-code-line { font-size:0.72rem; color:var(--muted); margin-top:0.2rem; font-weight:400; }
  .room-code-line span { color:var(--accent); font-weight:700; cursor:pointer; }
  .role-badge { padding:0.3rem 0.75rem; border-radius:20px; font-size:0.68rem; font-weight:700; letter-spacing:0.03em; }
  .role-host { background:var(--accent-light); color:var(--accent); border:1px solid var(--accent-mid); }
  .role-member { background:#f0f0ff; color:var(--accent2); border:1px solid #d0d0fa; }

  .status-bar { display:flex; align-items:center; gap:0.5rem; padding:0.6rem 0.9rem; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:1rem; font-size:0.78rem; color:var(--muted); font-weight:400; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; }
  .status-dot.running { background:#22c55e; animation:pulse 1s infinite; }
  .status-dot.countdown { background:var(--accent); animation:pulse 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .beat-display { text-align:center; margin:1.2rem 0; }
  .beat-circle { width:155px; height:155px; border-radius:50%; border:3px solid var(--border); margin:0 auto; display:flex; align-items:center; justify-content:center; flex-direction:column; background:var(--surface); transition:all 0.05s; }
  .beat-circle.beat-on { border-color:var(--accent); box-shadow:0 0 0 8px var(--accent-light), 0 0 30px rgba(60,65,205,0.2); background:#f0f0ff; }
  .beat-circle.downbeat.beat-on { border-color:var(--accent); box-shadow:0 0 0 10px var(--accent-mid), 0 0 40px rgba(60,65,205,0.3); background:#e8e8ff; }
  .bpm-big { font-size:3.2rem; font-weight:700; line-height:1; color:var(--text); font-family:'Bebas Neue',cursive; }
  .bpm-label { font-size:0.65rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.15em; }
  .current-song-name { font-size:0.72rem; color:var(--accent); margin-top:0.25rem; max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; }
  .beat-dots { display:flex; justify-content:center; gap:0.5rem; margin-top:0.8rem; }
  .beat-dot { width:10px; height:10px; border-radius:50%; background:var(--surface2); border:1.5px solid var(--border); transition:all 0.05s; }
  .beat-dot.active { background:var(--accent); box-shadow:0 0 8px var(--beat-glow); border-color:var(--accent); }
  .beat-dot.downbeat.active { background:var(--accent); box-shadow:0 0 12px var(--beat-glow); }

  .control-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; margin-bottom:0.8rem; }
  .ctrl-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.7rem; }
  .ctrl-label { font-size:0.7rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
  .ctrl-readout { font-size:0.95rem; font-weight:700; }
  .ctrl-readout.accent { color:var(--accent); }
  .ctrl-readout.blue { color:#2196f3; }
  .ctrl-readout.orange { color:#f57c00; }
  .ctrl-readout.muted { color:var(--muted); }
  .btn-row { display:flex; align-items:center; gap:0.5rem; }
  .ctrl-btn { width:38px; height:38px; border-radius:8px; border:1.5px solid var(--border); background:var(--bg); color:var(--text2); font-size:0.85rem; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; font-family:'Noto Sans KR',sans-serif; }
  .ctrl-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
  input[type="range"] { flex:1; -webkit-appearance:none; height:4px; background:var(--surface2); border-radius:4px; outline:none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--accent); cursor:pointer; box-shadow:0 2px 6px var(--beat-glow); }

  .time-sig-row { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:0.8rem 1rem; margin-bottom:0.8rem; display:flex; align-items:center; gap:0.8rem; }
  .ts-label { font-size:0.7rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; white-space:nowrap; }
  .ts-btns { display:flex; gap:0.4rem; }
  .ts-btn { padding:0.3rem 0.75rem; background:var(--bg); border:1.5px solid var(--border); color:var(--muted); font-size:0.78rem; font-weight:600; cursor:pointer; border-radius:6px; transition:all 0.15s; font-family:'Noto Sans KR',sans-serif; }
  .ts-btn.active { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }

  .btn-start { width:100%; padding:1.1rem; font-family:'Noto Sans KR',sans-serif; font-size:1rem; font-weight:700; border:none; cursor:pointer; border-radius:12px; background:var(--accent); color:white; transition:all 0.15s; margin-bottom:0.5rem; }
  .btn-start:hover { background:#3035b8; box-shadow:0 4px 20px rgba(60,65,205,0.35); transform:translateY(-1px); }
  .btn-stop { width:100%; padding:0.85rem; font-family:'Noto Sans KR',sans-serif; font-size:0.95rem; font-weight:600; border:1.5px solid var(--border); background:var(--bg); color:var(--text2); cursor:pointer; border-radius:12px; transition:all 0.15s; margin-bottom:0.8rem; }
  .btn-stop:hover { border-color:var(--danger); color:var(--danger); }

  /* SETLIST */
  .setlist-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; margin-bottom:0.8rem; }
  .setlist-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem; }
  .setlist-title { font-size:0.7rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
  .setlist-add-form { display:flex; gap:0.5rem; margin-bottom:0.8rem; }
  .setlist-add-form input[type="text"] { flex:1; padding:0.6rem 0.8rem; font-size:0.85rem; border-radius:8px; }
  .setlist-add-form input.bpm-input { width:76px; flex:none; }
  .btn-add-song { padding:0.6rem 0.9rem; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; font-size:0.85rem; font-weight:700; font-family:'Noto Sans KR',sans-serif; transition:all 0.15s; white-space:nowrap; }
  .btn-add-song:hover { background:#3035b8; }
  .setlist-list { display:flex; flex-direction:column; gap:0.4rem; }
  .setlist-empty { text-align:center; color:var(--muted); font-size:0.8rem; padding:1rem 0; font-weight:400; }
  .song-item { display:flex; align-items:center; gap:0.6rem; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:0.65rem 0.8rem; cursor:pointer; transition:all 0.15s; }
  .song-item:hover { border-color:var(--accent); background:var(--accent-light); }
  .song-item.active { border-color:var(--accent); background:var(--accent-light); box-shadow:0 0 0 1px var(--accent-mid); }
  .song-num { font-size:0.82rem; font-weight:700; color:var(--muted); width:18px; flex-shrink:0; }
  .song-info { flex:1; min-width:0; }
  .song-name { font-size:0.88rem; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .song-bpm { font-size:0.78rem; font-weight:600; color:var(--accent2); margin-top:0.1rem; }
  .song-active-badge { font-size:0.62rem; font-weight:700; color:var(--accent); background:var(--accent-light); border:1px solid var(--accent-mid); padding:0.15rem 0.45rem; border-radius:4px; white-space:nowrap; }
  .btn-del-song { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.9rem; padding:0.25rem 0.4rem; border-radius:4px; transition:all 0.15s; flex-shrink:0; }
  .btn-del-song:hover { color:var(--danger); background:#fff0f0; }

  .current-song-display { background:var(--accent-light); border:1.5px solid var(--accent-mid); border-radius:12px; padding:0.9rem 1rem; margin-bottom:0.8rem; display:none; }
  .current-song-display.visible { display:block; }
  .csd-label { font-size:0.68rem; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.3rem; }
  .csd-name { font-size:1rem; font-weight:700; color:var(--text); }
  .csd-bpm { font-size:0.85rem; font-weight:600; color:var(--accent2); margin-top:0.15rem; }
  .offset-desc { font-size:0.68rem; color:var(--muted); margin-top:0.5rem; text-align:center; line-height:1.5; font-weight:400; }

  .sync-status { font-size:0.68rem; font-weight:500; color:var(--muted); text-align:center; padding:0.3rem; margin-bottom:0.6rem; }
  .sync-status.good { color:#22c55e; }
  .sync-status.measuring { color:var(--accent); }

  /* MEMBERS */
  .members-section { margin-bottom:0.8rem; }
  .members-label { font-size:0.68rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem; }
  .members-list { display:flex; flex-wrap:wrap; gap:0.4rem; }
  .member-chip { display:flex; align-items:center; gap:0.35rem; background:var(--surface); border:1px solid var(--border); padding:0.28rem 0.7rem; border-radius:20px; font-size:0.78rem; font-weight:500; }
  .member-dot { width:6px; height:6px; border-radius:50%; background:#22c55e; }
  .btn-transfer { background:none; border:1px solid var(--border); color:var(--muted); font-size:0.65rem; padding:0.1rem 0.4rem; border-radius:4px; cursor:pointer; margin-left:0.2rem; font-family:'Noto Sans KR',sans-serif; transition:all 0.15s; }
  .btn-transfer:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }

  .member-notice { text-align:center; padding:1.3rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:0.8rem; color:var(--muted); font-size:0.85rem; line-height:1.8; font-weight:400; }
  .notice-icon { font-size:1.8rem; margin-bottom:0.4rem; }

  .countdown-overlay { position:fixed; inset:0; background:rgba(255,255,255,0.97); display:none; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:0.5rem; }
  .countdown-overlay.show { display:flex; }
  .countdown-song { font-size:1rem; font-weight:700; color:var(--accent); letter-spacing:0.05em; }
  .countdown-num { font-size:10rem; font-weight:900; color:var(--accent); text-shadow:0 0 40px var(--beat-glow); animation:countScale 0.85s ease-out; line-height:1; }
  @keyframes countScale { 0%{transform:scale(1.4);opacity:0} 20%{opacity:1} 80%{transform:scale(1);opacity:1} 100%{transform:scale(0.85);opacity:0} }

  .btn-leave { width:100%; background:none; border:1px solid var(--border); color:var(--muted); padding:0.55rem; font-size:0.78rem; font-weight:500; cursor:pointer; border-radius:8px; transition:all 0.15s; font-family:'Noto Sans KR',sans-serif; }
  .btn-leave:hover { border-color:var(--danger); color:var(--danger); }

  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:white; padding:0.55rem 1.3rem; border-radius:20px; font-size:0.78rem; font-weight:500; opacity:0; transition:all 0.3s; pointer-events:none; z-index:2000; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm0 2a7 7 0 110 14A7 7 0 0112 5zm-.5 3v5.25l4.5 2.67-.75 1.23L10 14V8h1.5z"/></svg>
  </div>
  <div>
    <div class="logo-text">뉴웨이브<span> 똥먹자</span></div>
  </div>
</header>

<div class="app">

  <!-- LOBBY -->
  <div id="screen-lobby" class="screen active">
    <div class="lobby-hero">
      <h1>함께 맞추는<br><span>완벽한 박자</span></h1>
      <p>밴드 멤버 모두가 같은 클릭을 듣는 메트로놈</p>
      <p>아영이 파이팅💙</p>
    </div>
    <div class="input-group" style="margin-bottom:1.5rem;">
      <label>닉네임</label>
      <input type="text" id="input-name" placeholder="예: 드러머, 기타리스트" maxlength="20">
    </div>
    <div class="lobby-section">
      <div class="lobby-section-title">방 만들기</div>
      <div class="input-group">
        <label>방 이름</label>
        <input type="text" id="input-room-name" placeholder="예: 홍대 인디밴드" maxlength="20">
      </div>
      <button class="btn btn-primary" onclick="createRoom()">방 만들기 (방장)</button>
    </div>
    <div class="lobby-divider">또는</div>
    <div class="lobby-section">
      <div class="lobby-section-title">기존 방 참가</div>
      <div class="input-group">
        <label>방 코드</label>
        <input type="text" id="input-room-code" placeholder="예: ABC123" maxlength="6" style="text-transform:uppercase;letter-spacing:0.2em">
      </div>
      <button class="btn btn-secondary" onclick="joinRoom()">참가하기</button>
    </div>
  </div>

  <!-- ROOM -->
  <div id="screen-room" class="screen">
    <div class="room-header">
      <div>
        <div class="room-name-display" id="display-room-name">밴드방</div>
        <div class="room-code-line">코드: <span id="display-room-code" onclick="copyCode()">------</span> 탭해서 복사</div>
      </div>
      <div id="display-role-badge" class="role-badge role-host">방장</div>
    </div>

    <div class="status-bar">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">대기 중...</span>
    </div>

    <div class="beat-display">
      <div class="beat-circle" id="beat-circle">
        <div class="bpm-big" id="bpm-display">120</div>
        <div class="bpm-label">BPM</div>
        <div class="current-song-name" id="current-song-name"></div>
      </div>
      <div class="beat-dots" id="beat-dots"></div>
    </div>

    <!-- 방장 전용 -->
    <div id="host-panel">
      <div class="setlist-box">
        <div class="setlist-header">
          <div class="setlist-title">🎵 셋리스트</div>
        </div>
        <div class="setlist-add-form">
          <input type="text" id="input-song-name" placeholder="곡 이름" maxlength="30">
          <input type="text" id="input-song-bpm" placeholder="BPM" maxlength="3" class="bpm-input" inputmode="numeric">
          <button class="btn-add-song" onclick="addSong()">+ 추가</button>
        </div>
        <div class="setlist-list" id="setlist-list">
          <div class="setlist-empty">곡을 추가해보세요!</div>
        </div>
      </div>
      <div class="control-box">
        <div class="ctrl-top">
          <div class="ctrl-label">템포</div>
          <div class="ctrl-readout accent" id="bpm-readout">120 BPM</div>
        </div>
        <div class="btn-row">
          <button class="ctrl-btn" onclick="changeBpm(-5)">−5</button>
          <button class="ctrl-btn" onclick="changeBpm(-1)">−</button>
          <input type="range" id="bpm-slider" min="40" max="240" value="120" oninput="setBpmSlider(this.value)">
          <button class="ctrl-btn" onclick="changeBpm(1)">+</button>
          <button class="ctrl-btn" onclick="changeBpm(5)">+5</button>
        </div>
      </div>
      <div class="time-sig-row">
        <div class="ts-label">박자</div>
        <div class="ts-btns">
          <button class="ts-btn active" onclick="setTimeSig(4)" id="ts-4">4/4</button>
          <button class="ts-btn" onclick="setTimeSig(3)" id="ts-3">3/4</button>
          <button class="ts-btn" onclick="setTimeSig(6)" id="ts-6">6/8</button>
          <button class="ts-btn" onclick="setTimeSig(2)" id="ts-2">2/4</button>
        </div>
      </div>
      <button class="btn-start" onclick="startMetronome()">▶ 시작 (3초 카운트다운)</button>
      <button class="btn-stop" onclick="stopMetronome()">■ 정지</button>
    </div>

    <!-- 멤버 전용 -->
    <div id="member-panel" style="display:none">
      <div class="member-notice">
        <div class="notice-icon">🎧</div>
        이어폰 꽂고 기다리세요!<br>방장이 시작하면 자동으로 동기화돼요.
      </div>
      <div class="current-song-display" id="current-song-display">
        <div class="csd-label">현재 곡</div>
        <div class="csd-name" id="csd-name">—</div>
        <div class="csd-bpm" id="csd-bpm"></div>
      </div>
    </div>

    <!-- 딜레이 (모두) -->
    <div class="control-box">
      <div class="ctrl-top">
        <div class="ctrl-label">내 딜레이 조절</div>
        <div class="ctrl-readout muted" id="offset-readout">0 ms</div>
      </div>
      <div class="btn-row">
        <button class="ctrl-btn" onclick="changeOffset(-10)">−10</button>
        <button class="ctrl-btn" onclick="changeOffset(-1)">−1</button>
        <input type="range" id="offset-slider" min="-200" max="200" value="0" oninput="setOffsetSlider(this.value)">
        <button class="ctrl-btn" onclick="changeOffset(1)">+1</button>
        <button class="ctrl-btn" onclick="changeOffset(10)">+10</button>
      </div>
      <div class="offset-desc">소리가 늦게 들리면 ← 왼쪽 (−) / 너무 빠르면 → 오른쪽 (+)</div>
    </div>

    <div class="sync-status measuring" id="sync-status">⏱ 서버 시간 측정 중...</div>

    <div class="members-section">
      <div class="members-label">접속 중인 멤버</div>
      <div class="members-list" id="members-list"></div>
    </div>

    <button class="btn-leave" onclick="leaveRoom()">← 나가기</button>
  </div>

</div>

<div class="countdown-overlay" id="countdown-overlay">
  <div class="countdown-song" id="countdown-song"></div>
  <div class="countdown-num" id="countdown-num">3</div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjExOj4c1VfxRpmrCWOMR69WCX7sr6HeI",
  authDomain: "band-click.firebaseapp.com",
  projectId: "band-click",
  storageBucket: "band-click.firebasestorage.app",
  messagingSenderId: "270186166321",
  appId: "1:270186166321:web:3b238b9c4ab43b56ddbd10",
  databaseURL: "https://band-click-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

const S = {
  myId: Math.random().toString(36).slice(2, 10),
  myName: '', isHost: false, roomCode: '',
  bpm: 120, timeSig: 4,
  isPlaying: false, currentBeat: 0,
  audioCtx: null, nextBeatTime: 0,
  schedulerTimer: null, beatFlashTimer: null,
  roomRef: null, unsubscribe: null,
  serverTimeOffset: 0, userOffsetMs: 0,
  prevStartAt: null, prevIsPlaying: false,
  setlist: [], activeSongId: null,
};

async function syncServerTime() {
  const syncEl = document.getElementById('sync-status');
  if (syncEl) { syncEl.textContent = '⏱ 서버 시간 측정 중...'; syncEl.className = 'sync-status measuring'; }
  const samples = [];
  for (let i = 0; i < 5; i++) {
    await new Promise(resolve => {
      onValue(ref(db, '.info/serverTimeOffset'), snap => { samples.push(snap.val() || 0); resolve(); }, { onlyOnce: true });
    });
    if (i < 4) await new Promise(r => setTimeout(r, 150));
  }
  samples.sort((a, b) => a - b);
  const mid = samples.slice(1, 4);
  S.serverTimeOffset = mid.reduce((a, b) => a + b, 0) / mid.length;
  if (syncEl) { syncEl.textContent = '✓ 서버 동기화 완료'; syncEl.className = 'sync-status good'; }
}

function serverNow() { return Date.now() + S.serverTimeOffset; }

function getAudioCtx() {
  if (!S.audioCtx) S.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return S.audioCtx;
}

function scheduleClick(time, isDownbeat) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = isDownbeat ? 1800 : 1000;
  gain.gain.setValueAtTime(isDownbeat ? 0.7 : 0.4, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
  osc.start(time); osc.stop(time + 0.06);
}

function scheduler() {
  if (!S.isPlaying) return;
  const ctx = getAudioCtx();
  while (S.nextBeatTime < ctx.currentTime + 0.1) {
    const beat = S.currentBeat % S.timeSig;
    scheduleClick(S.nextBeatTime, beat === 0);
    const delay = (S.nextBeatTime - ctx.currentTime) * 1000;
    const b = beat;
    setTimeout(() => flashBeat(b), Math.max(0, delay));
    S.nextBeatTime += 60 / S.bpm;
    S.currentBeat++;
  }
}

function flashBeat(beat) {
  const circle = document.getElementById('beat-circle');
  const dots = document.querySelectorAll('.beat-dot');
  circle.classList.add('beat-on');
  if (beat === 0) circle.classList.add('downbeat');
  dots.forEach((d, i) => {
    d.classList.remove('active','downbeat');
    if (i === beat) { d.classList.add('active'); if (beat === 0) d.classList.add('downbeat'); }
  });
  clearTimeout(S.beatFlashTimer);
  S.beatFlashTimer = setTimeout(() => circle.classList.remove('beat-on','downbeat'), 80);
}

function startScheduler() { S.schedulerTimer = setInterval(scheduler, 25); }
function stopScheduler() {
  clearInterval(S.schedulerTimer); S.schedulerTimer = null;
  document.getElementById('beat-circle').classList.remove('beat-on','downbeat');
  document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active','downbeat'));
}

async function doCountdownAndStart(startAt) {
  const ctx = getAudioCtx();
  await ctx.resume();
  const adjustedStartAt = startAt - S.userOffsetMs;
  if (adjustedStartAt - serverNow() < -500) return;

  setStatus('countdown', '카운트다운...');
  const overlay = document.getElementById('countdown-overlay');
  const numEl = document.getElementById('countdown-num');
  const songEl = document.getElementById('countdown-song');
  const activeSong = S.setlist.find(s => s.id === S.activeSongId);
  songEl.textContent = activeSong ? activeSong.name : '';
  overlay.classList.add('show');

  let count = Math.ceil((startAt - serverNow()) / 1000);
  numEl.textContent = count;
  numEl.style.animation = 'none'; void numEl.offsetHeight; numEl.style.animation = 'countScale 0.85s ease-out';

  const tick = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(tick);
      overlay.classList.remove('show');
      setStatus('running', activeSong ? `▶ ${activeSong.name}` : '재생 중');
    } else {
      numEl.textContent = count;
      numEl.style.animation = 'none'; void numEl.offsetHeight; numEl.style.animation = 'countScale 0.85s ease-out';
    }
  }, 1000);

  await new Promise(r => setTimeout(r, Math.max(0, adjustedStartAt - serverNow() - 30)));
  S.nextBeatTime = getAudioCtx().currentTime + Math.max(0, (adjustedStartAt - serverNow()) / 1000);
  S.currentBeat = 0; S.isPlaying = true;
  startScheduler();
}

function stopNow() { S.isPlaying = false; stopScheduler(); setStatus('', '정지됨'); }

function generateCode() { return Math.random().toString(36).slice(2, 8).toUpperCase(); }

function applyHostUI() {
  S.isHost = true;
  document.getElementById('display-role-badge').textContent = '방장';
  document.getElementById('display-role-badge').className = 'role-badge role-host';
  document.getElementById('host-panel').style.display = 'block';
  document.getElementById('member-panel').style.display = 'none';
}

function applyMemberUI() {
  S.isHost = false;
  document.getElementById('display-role-badge').textContent = '멤버';
  document.getElementById('display-role-badge').className = 'role-badge role-member';
  document.getElementById('host-panel').style.display = 'none';
  document.getElementById('member-panel').style.display = 'block';
}

window.createRoom = async function() {
  const name = document.getElementById('input-name').value.trim();
  const roomName = document.getElementById('input-room-name').value.trim();
  if (!name) { alert('닉네임을 입력하세요!'); return; }
  if (!roomName) { alert('방 이름을 입력하세요!'); return; }
  const code = generateCode();
  S.myName = name; S.isHost = true; S.roomCode = code;
  await set(ref(db, 'rooms/' + code), { name: roomName, bpm: 120, timeSig: 4, isPlaying: false, startAt: null, setlist: [], activeSongId: null, createdAt: serverTimestamp() });
  await set(ref(db, `rooms/${code}/members/${S.myId}`), { name, isHost: true, joinedAt: serverTimestamp() });
  enterRoom(code, roomName, true);
  syncServerTime();
}

window.joinRoom = async function() {
  const name = document.getElementById('input-name').value.trim();
  const code = document.getElementById('input-room-code').value.trim().toUpperCase();
  if (!name) { alert('닉네임을 입력하세요!'); return; }
  if (!code) { alert('방 코드를 입력하세요!'); return; }
  const snap = await get(ref(db, 'rooms/' + code));
  if (!snap.exists()) { alert('방을 찾을 수 없어요!'); return; }
  const data = snap.val();
  S.myName = name; S.isHost = false; S.roomCode = code;
  await set(ref(db, `rooms/${code}/members/${S.myId}`), { name, isHost: false, joinedAt: serverTimestamp() });
  enterRoom(code, data.name, false);
  syncServerTime();
}

function enterRoom(code, roomName, isHost) {
  document.getElementById('screen-lobby').classList.remove('active');
  document.getElementById('screen-room').classList.add('active');
  document.getElementById('display-room-name').textContent = roomName;
  document.getElementById('display-room-code').textContent = code;
  isHost ? applyHostUI() : applyMemberUI();
  renderBeatDots(4); setStatus('', '대기 중...');

  S.roomRef = ref(db, 'rooms/' + code);
  S.prevStartAt = null; S.prevIsPlaying = false;

  S.unsubscribe = onValue(S.roomRef, snap => {
    if (!snap.exists()) {
      // 방 삭제됨 → 로비로
      stopNow();
      document.getElementById('screen-room').classList.remove('active');
      document.getElementById('screen-lobby').classList.add('active');
      showToast('방장이 방을 종료했어요');
      return;
    }
    const d = snap.val();
    if (d.bpm && d.bpm !== S.bpm) {
      S.bpm = d.bpm;
      document.getElementById('bpm-display').textContent = d.bpm;
      document.getElementById('bpm-readout').textContent = d.bpm + ' BPM';
      const sl = document.getElementById('bpm-slider'); if (sl) sl.value = d.bpm;
    }
    if (d.timeSig && d.timeSig !== S.timeSig) {
      S.timeSig = d.timeSig; renderBeatDots(d.timeSig);
      document.querySelectorAll('.ts-btn').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('ts-' + d.timeSig); if (btn) btn.classList.add('active');
    }
    if (d.setlist !== undefined) {
      S.setlist = Array.isArray(d.setlist) ? d.setlist : Object.values(d.setlist || {});
      renderSetlist();
    }
    if (d.activeSongId !== undefined && d.activeSongId !== S.activeSongId) {
      S.activeSongId = d.activeSongId;
      const song = S.setlist.find(s => s.id === d.activeSongId);
      document.getElementById('current-song-name').textContent = song ? song.name : '';
      const csd = document.getElementById('current-song-display');
      if (csd) {
        if (song) { csd.classList.add('visible'); document.getElementById('csd-name').textContent = song.name; document.getElementById('csd-bpm').textContent = song.bpm + ' BPM'; }
        else csd.classList.remove('visible');
      }
      renderSetlist();
    }
    if (d.members) renderMembers(d.members);

    // 내가 새 방장이 됐는지 감지
    if (!S.isHost && d.members && d.members[S.myId] && d.members[S.myId].isHost) {
      applyHostUI();
      showToast('방장이 됐어요! 👑');
      if (d.members) renderMembers(d.members);
    }

    if (!S.isHost && d.isPlaying && d.startAt && d.startAt !== S.prevStartAt && !S.isPlaying) { S.prevStartAt = d.startAt; doCountdownAndStart(d.startAt); }
    if (!S.isHost && !d.isPlaying && S.prevIsPlaying && S.isPlaying) stopNow();
    S.prevIsPlaying = d.isPlaying;
  });
}

window.transferHost = async function(newHostId, newHostName) {
  if (!S.isHost) return;
  if (!confirm(`${newHostName}님에게 방장을 넘기시겠어요?`)) return;
  await update(ref(db, `rooms/${S.roomCode}/members/${S.myId}`), { isHost: false });
  await update(ref(db, `rooms/${S.roomCode}/members/${newHostId}`), { isHost: true });
  applyMemberUI();
  showToast('방장을 넘겼어요');
}

window.addSong = function() {
  const nameEl = document.getElementById('input-song-name');
  const bpmEl = document.getElementById('input-song-bpm');
  const name = nameEl.value.trim();
  const bpm = parseInt(bpmEl.value);
  if (!name) { alert('곡 이름을 입력하세요!'); return; }
  if (!bpm || bpm < 40 || bpm > 240) { alert('BPM을 40~240 사이로 입력하세요!'); return; }
  const song = { id: Date.now().toString(), name, bpm };
  S.setlist.push(song);
  nameEl.value = ''; bpmEl.value = '';
  if (S.roomRef) update(S.roomRef, { setlist: S.setlist });
  renderSetlist();
}

window.deleteSong = function(id) {
  S.setlist = S.setlist.filter(s => s.id !== id);
  if (S.activeSongId === id) { S.activeSongId = null; document.getElementById('current-song-name').textContent = ''; }
  if (S.roomRef) update(S.roomRef, { setlist: S.setlist, activeSongId: S.activeSongId });
  renderSetlist();
}

window.selectSong = function(id) {
  const song = S.setlist.find(s => s.id === id);
  if (!song) return;
  S.activeSongId = id; S.bpm = song.bpm;
  document.getElementById('bpm-display').textContent = song.bpm;
  document.getElementById('bpm-readout').textContent = song.bpm + ' BPM';
  document.getElementById('bpm-slider').value = song.bpm;
  document.getElementById('current-song-name').textContent = song.name;
  if (S.roomRef) update(S.roomRef, { bpm: song.bpm, activeSongId: id });
  renderSetlist();
  showToast(`${song.name} — ${song.bpm} BPM`);
}

function renderSetlist() {
  const list = document.getElementById('setlist-list');
  if (!list) return;
  if (S.setlist.length === 0) { list.innerHTML = '<div class="setlist-empty">곡을 추가해보세요!</div>'; return; }
  list.innerHTML = S.setlist.map((song, i) => `
    <div class="song-item ${song.id === S.activeSongId ? 'active' : ''}" onclick="selectSong('${song.id}')">
      <div class="song-num">${i + 1}</div>
      <div class="song-info">
        <div class="song-name">${song.name}</div>
        <div class="song-bpm">${song.bpm} BPM</div>
      </div>
      ${song.id === S.activeSongId ? '<div class="song-active-badge">선택됨</div>' : ''}
      <button class="btn-del-song" onclick="event.stopPropagation(); deleteSong('${song.id}')">✕</button>
    </div>
  `).join('');
}

window.startMetronome = async function() {
  if (S.isPlaying) return;
  const startAt = serverNow() + 3200;
  await update(S.roomRef, { isPlaying: true, startAt, bpm: S.bpm, timeSig: S.timeSig });
  doCountdownAndStart(startAt);
}

window.stopMetronome = async function() {
  await update(S.roomRef, { isPlaying: false, startAt: null });
  stopNow();
}

window.leaveRoom = async function() {
  if (S.unsubscribe) S.unsubscribe();
  stopNow();
  if (S.isHost) {
    if (!confirm('방을 나가면 방이 삭제되고 모든 멤버가 퇴장돼요. 나가시겠어요?')) return;
    await remove(ref(db, `rooms/${S.roomCode}`));
  } else {
    await remove(ref(db, `rooms/${S.roomCode}/members/${S.myId}`));
  }
  S.roomCode = ''; S.isHost = false;
  document.getElementById('screen-room').classList.remove('active');
  document.getElementById('screen-lobby').classList.add('active');
}

window.changeBpm = function(d) {
  S.bpm = Math.min(240, Math.max(40, S.bpm + d));
  S.activeSongId = null;
  document.getElementById('current-song-name').textContent = '';
  document.getElementById('bpm-display').textContent = S.bpm;
  document.getElementById('bpm-readout').textContent = S.bpm + ' BPM';
  document.getElementById('bpm-slider').value = S.bpm;
  if (S.roomRef) update(S.roomRef, { bpm: S.bpm, activeSongId: null });
  renderSetlist();
}

window.setBpmSlider = function(val) {
  S.bpm = parseInt(val); S.activeSongId = null;
  document.getElementById('current-song-name').textContent = '';
  document.getElementById('bpm-display').textContent = S.bpm;
  document.getElementById('bpm-readout').textContent = S.bpm + ' BPM';
  if (S.roomRef) update(S.roomRef, { bpm: S.bpm, activeSongId: null });
  renderSetlist();
}

window.setTimeSig = function(n) {
  S.timeSig = n; renderBeatDots(n);
  document.querySelectorAll('.ts-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('ts-' + n).classList.add('active');
  if (S.roomRef) update(S.roomRef, { timeSig: n });
}

window.changeOffset = function(delta) {
  S.userOffsetMs = Math.min(200, Math.max(-200, S.userOffsetMs + delta));
  updateOffsetDisplay();
}
window.setOffsetSlider = function(val) {
  S.userOffsetMs = parseInt(val); updateOffsetDisplay();
}
function updateOffsetDisplay() {
  const el = document.getElementById('offset-readout');
  document.getElementById('offset-slider').value = S.userOffsetMs;
  if (S.userOffsetMs < 0) { el.textContent = S.userOffsetMs + ' ms'; el.className = 'ctrl-readout blue'; }
  else if (S.userOffsetMs > 0) { el.textContent = '+' + S.userOffsetMs + ' ms'; el.className = 'ctrl-readout orange'; }
  else { el.textContent = '0 ms'; el.className = 'ctrl-readout muted'; }
}

window.copyCode = function() {
  navigator.clipboard.writeText(S.roomCode).catch(() => {});
  showToast('코드 복사됨!');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function renderBeatDots(n) {
  const c = document.getElementById('beat-dots'); c.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'beat-dot' + (i === 0 ? ' downbeat' : '');
    c.appendChild(d);
  }
}

function renderMembers(members) {
  const list = document.getElementById('members-list'); list.innerHTML = '';
  Object.entries(members).forEach(([id, m]) => {
    const chip = document.createElement('div');
    chip.className = 'member-chip';
    const transferBtn = (S.isHost && id !== S.myId && !m.isHost)
      ? `<button class="btn-transfer" onclick="transferHost('${id}','${m.name}')">방장넘기기</button>`
      : '';
    chip.innerHTML = `<div class="member-dot"></div>${m.name}${m.isHost ? ' 👑' : ''}${transferBtn}`;
    list.appendChild(chip);
  });
}

function setStatus(type, text) {
  document.getElementById('status-dot').className = 'status-dot ' + type;
  document.getElementById('status-text').textContent = text;
}

renderBeatDots(4);
</script>
</body>
</html>
