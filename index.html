<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAND METRO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a;
    --accent: #ff3b3b; --accent2: #ff8c00;
    --text: #f0f0f0; --muted: #555;
    --beat-glow: rgba(255,59,59,0.6);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; overflow-x:hidden; }
  header { padding:1.5rem 1.5rem 1rem; border-bottom:1px solid #1e1e1e; display:flex; align-items:baseline; gap:0.8rem; }
  .logo { font-family:'Bebas Neue',cursive; font-size:2.4rem; letter-spacing:0.15em; color:var(--accent); text-shadow:0 0 30px var(--beat-glow); line-height:1; }
  .logo-sub { font-family:'Bebas Neue',cursive; font-size:1rem; color:var(--muted); letter-spacing:0.3em; }
  .app { max-width:460px; margin:0 auto; padding:1.5rem; }
  .screen { display:none; }
  .screen.active { display:block; }

  /* LOBBY */
  .section-title { font-family:'Bebas Neue',cursive; font-size:1.2rem; letter-spacing:0.2em; color:var(--muted); margin:1.5rem 0 0.8rem; }
  .input-group { margin-bottom:0.8rem; }
  .input-group label { display:block; font-size:0.7rem; letter-spacing:0.15em; color:var(--muted); margin-bottom:0.3rem; text-transform:uppercase; }
  input[type="text"] { width:100%; background:var(--surface); border:1px solid #2a2a2a; color:var(--text); padding:0.85rem 1rem; font-size:1rem; font-family:'Noto Sans KR',sans-serif; outline:none; border-radius:4px; transition:border-color 0.2s; }
  input[type="text"]:focus { border-color:var(--accent); }
  .btn { width:100%; padding:1rem; font-family:'Bebas Neue',cursive; font-size:1.2rem; letter-spacing:0.2em; border:none; cursor:pointer; border-radius:4px; transition:all 0.15s; margin-bottom:0.5rem; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:hover { box-shadow:0 4px 20px rgba(255,59,59,0.4); transform:translateY(-1px); }
  .btn-secondary { background:var(--surface); color:var(--text); border:1px solid #2a2a2a; }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .divider { display:flex; align-items:center; gap:1rem; margin:1.2rem 0; color:var(--muted); font-size:0.75rem; letter-spacing:0.1em; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:#222; }

  /* ROOM HEADER */
  .room-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.2rem; padding-bottom:1rem; border-bottom:1px solid #1e1e1e; }
  .room-name-display { font-family:'Bebas Neue',cursive; font-size:1.6rem; letter-spacing:0.1em; }
  .room-code-line { font-size:0.72rem; color:var(--muted); margin-top:0.15rem; }
  .room-code-line span { color:var(--accent2); font-weight:700; cursor:pointer; letter-spacing:0.15em; }
  .role-badge { padding:0.25rem 0.7rem; border-radius:3px; font-size:0.65rem; letter-spacing:0.15em; font-weight:700; text-transform:uppercase; }
  .role-host { background:rgba(255,59,59,0.12); color:var(--accent); border:1px solid rgba(255,59,59,0.25); }
  .role-member { background:rgba(255,140,0,0.1); color:var(--accent2); border:1px solid rgba(255,140,0,0.2); }

  /* STATUS */
  .status-bar { display:flex; align-items:center; gap:0.5rem; padding:0.55rem 0.8rem; background:var(--surface); border:1px solid #1e1e1e; border-radius:5px; margin-bottom:1rem; font-size:0.78rem; color:var(--muted); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; }
  .status-dot.running { background:#2ecc71; animation:pulse 1s infinite; }
  .status-dot.countdown { background:var(--accent2); animation:pulse 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* BEAT */
  .beat-display { text-align:center; margin:1.5rem 0; }
  .beat-circle { width:160px; height:160px; border-radius:50%; border:3px solid #222; margin:0 auto; display:flex; align-items:center; justify-content:center; flex-direction:column; background:var(--surface); transition:all 0.05s; }
  .beat-circle.beat-on { border-color:var(--accent); box-shadow:0 0 0 8px rgba(255,59,59,0.08),0 0 40px rgba(255,59,59,0.25); background:#1a0808; }
  .beat-circle.downbeat.beat-on { border-color:#fff; box-shadow:0 0 0 8px rgba(255,255,255,0.06),0 0 50px rgba(255,59,59,0.4); }
  .bpm-big { font-family:'Bebas Neue',cursive; font-size:3.5rem; line-height:1; }
  .bpm-label { font-size:0.65rem; letter-spacing:0.25em; color:var(--muted); text-transform:uppercase; }
  .beat-dots { display:flex; justify-content:center; gap:0.5rem; margin-top:0.8rem; }
  .beat-dot { width:11px; height:11px; border-radius:50%; background:#222; border:1px solid #333; transition:all 0.05s; }
  .beat-dot.active { background:var(--accent); box-shadow:0 0 8px var(--beat-glow); border-color:var(--accent); }
  .beat-dot.downbeat.active { background:white; box-shadow:0 0 10px rgba(255,255,255,0.5); border-color:white; }

  /* CONTROLS */
  .control-box { background:var(--surface); border:1px solid #1e1e1e; border-radius:8px; padding:1rem; margin-bottom:0.8rem; }
  .ctrl-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.7rem; }
  .ctrl-label { font-size:0.65rem; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; }
  .ctrl-readout { font-family:'Bebas Neue',cursive; font-size:1rem; letter-spacing:0.1em; }
  .ctrl-readout.accent { color:var(--accent); }
  .ctrl-readout.blue { color:#4fc3f7; }
  .ctrl-readout.orange { color:var(--accent2); }
  .ctrl-readout.muted { color:var(--muted); }
  .btn-row { display:flex; align-items:center; gap:0.6rem; }
  .ctrl-btn { width:40px; height:40px; border-radius:4px; border:1px solid #2a2a2a; background:var(--surface2); color:var(--text); font-size:0.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; font-family:'Noto Sans KR',sans-serif; }
  .ctrl-btn:hover { border-color:var(--accent); color:var(--accent); }
  input[type="range"] { flex:1; -webkit-appearance:none; height:3px; background:#2a2a2a; border-radius:2px; outline:none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--accent); cursor:pointer; box-shadow:0 0 6px var(--beat-glow); }

  /* TIME SIG */
  .time-sig-row { background:var(--surface); border:1px solid #1e1e1e; border-radius:8px; padding:0.8rem 1rem; margin-bottom:0.8rem; display:flex; align-items:center; gap:0.8rem; }
  .ts-label { font-size:0.65rem; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; white-space:nowrap; }
  .ts-btns { display:flex; gap:0.4rem; }
  .ts-btn { padding:0.3rem 0.7rem; background:var(--surface2); border:1px solid #2a2a2a; color:var(--muted); font-size:0.75rem; cursor:pointer; border-radius:3px; transition:all 0.15s; font-family:'Noto Sans KR',sans-serif; }
  .ts-btn.active { background:rgba(255,59,59,0.12); border-color:var(--accent); color:var(--accent); }

  /* START/STOP */
  .btn-start { width:100%; padding:1.1rem; font-family:'Bebas Neue',cursive; font-size:1.3rem; letter-spacing:0.2em; border:none; cursor:pointer; border-radius:6px; background:var(--accent); color:white; transition:all 0.15s; margin-bottom:0.5rem; }
  .btn-start:hover { box-shadow:0 4px 24px rgba(255,59,59,0.4); transform:translateY(-1px); }
  .btn-stop { width:100%; padding:0.8rem; font-family:'Bebas Neue',cursive; font-size:1.1rem; letter-spacing:0.15em; border:1px solid #2a2a2a; background:var(--surface); color:var(--text); cursor:pointer; border-radius:6px; transition:all 0.15s; margin-bottom:0.8rem; }
  .btn-stop:hover { border-color:#555; }

  /* OFFSET */
  .offset-desc { font-size:0.68rem; color:var(--muted); margin-top:0.5rem; text-align:center; line-height:1.5; }

  /* SYNC STATUS */
  .sync-status { font-size:0.68rem; color:var(--muted); text-align:center; padding:0.3rem; margin-bottom:0.6rem; }
  .sync-status.good { color:#2ecc71; }
  .sync-status.measuring { color:var(--accent2); }

  /* MEMBERS */
  .members-section { margin-bottom:0.8rem; }
  .members-label { font-size:0.65rem; letter-spacing:0.18em; color:var(--muted); text-transform:uppercase; margin-bottom:0.5rem; }
  .members-list { display:flex; flex-wrap:wrap; gap:0.4rem; }
  .member-chip { display:flex; align-items:center; gap:0.35rem; background:var(--surface); border:1px solid #1e1e1e; padding:0.25rem 0.65rem; border-radius:20px; font-size:0.78rem; }
  .member-dot { width:6px; height:6px; border-radius:50%; background:#2ecc71; }

  /* MEMBER NOTICE */
  .member-notice { text-align:center; padding:1.2rem 1rem; background:var(--surface); border:1px solid #1e1e1e; border-radius:8px; margin-bottom:0.8rem; color:var(--muted); font-size:0.85rem; line-height:1.8; }
  .notice-icon { font-size:2rem; margin-bottom:0.4rem; }

  /* COUNTDOWN */
  .countdown-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.93); display:none; align-items:center; justify-content:center; z-index:999; }
  .countdown-overlay.show { display:flex; }
  .countdown-num { font-family:'Bebas Neue',cursive; font-size:11rem; color:var(--accent); text-shadow:0 0 60px var(--beat-glow); animation:countScale 0.85s ease-out; line-height:1; }
  @keyframes countScale { 0%{transform:scale(1.5);opacity:0} 20%{opacity:1} 80%{transform:scale(1);opacity:1} 100%{transform:scale(0.8);opacity:0} }

  .btn-leave { width:100%; background:none; border:1px solid #1e1e1e; color:var(--muted); padding:0.5rem; font-size:0.75rem; letter-spacing:0.08em; cursor:pointer; border-radius:4px; transition:all 0.15s; font-family:'Noto Sans KR',sans-serif; }
  .btn-leave:hover { border-color:#444; color:var(--text); }

  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px); background:#222; color:var(--text); padding:0.5rem 1.2rem; border-radius:20px; font-size:0.78rem; opacity:0; transition:all 0.3s; pointer-events:none; z-index:2000; border:1px solid #333; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">BAND METRO</div>
  <div class="logo-sub">밴드 싱크 메트로놈</div>
</header>

<div class="app">

  <!-- LOBBY -->
  <div id="screen-lobby" class="screen active">
    <div class="section-title">방 만들기</div>
    <div class="input-group">
      <label>내 이름 (악기)</label>
      <input type="text" id="input-name" placeholder="예: 드러머, 기타리스트" maxlength="20">
    </div>
    <div class="input-group">
      <label>방 이름</label>
      <input type="text" id="input-room-name" placeholder="예: 홍대 인디밴드" maxlength="20">
    </div>
    <button class="btn btn-primary" onclick="createRoom()">방 만들기 (방장)</button>
    <div class="divider">또는 기존 방 참가</div>
    <div class="input-group">
      <label>방 코드</label>
      <input type="text" id="input-room-code" placeholder="예: ABC123" maxlength="6" style="text-transform:uppercase;letter-spacing:0.2em">
    </div>
    <button class="btn btn-secondary" onclick="joinRoom()">참가하기</button>
  </div>

  <!-- ROOM -->
  <div id="screen-room" class="screen">

    <div class="room-header">
      <div>
        <div class="room-name-display" id="display-room-name">밴드방</div>
        <div class="room-code-line">코드: <span id="display-room-code" onclick="copyCode()">------</span> 탭해서 복사</div>
      </div>
      <div id="display-role-badge" class="role-badge role-host">방장</div>
    </div>

    <div class="status-bar">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">대기 중...</span>
    </div>

    <div class="beat-display">
      <div class="beat-circle" id="beat-circle">
        <div class="bpm-big" id="bpm-display">120</div>
        <div class="bpm-label">BPM</div>
      </div>
      <div class="beat-dots" id="beat-dots"></div>
    </div>

    <!-- 방장 전용 -->
    <div id="host-panel">
      <div class="control-box">
        <div class="ctrl-top">
          <div class="ctrl-label">템포</div>
          <div class="ctrl-readout accent" id="bpm-readout">120 BPM</div>
        </div>
        <div class="btn-row">
          <button class="ctrl-btn" onclick="changeBpm(-5)">−5</button>
          <button class="ctrl-btn" onclick="changeBpm(-1)">−</button>
          <input type="range" id="bpm-slider" min="40" max="240" value="120" oninput="setBpmSlider(this.value)">
          <button class="ctrl-btn" onclick="changeBpm(1)">+</button>
          <button class="ctrl-btn" onclick="changeBpm(5)">+5</button>
        </div>
      </div>

      <div class="time-sig-row">
        <div class="ts-label">박자</div>
        <div class="ts-btns">
          <button class="ts-btn active" onclick="setTimeSig(4)" id="ts-4">4/4</button>
          <button class="ts-btn" onclick="setTimeSig(3)" id="ts-3">3/4</button>
          <button class="ts-btn" onclick="setTimeSig(6)" id="ts-6">6/8</button>
          <button class="ts-btn" onclick="setTimeSig(2)" id="ts-2">2/4</button>
        </div>
      </div>

      <button class="btn-start" onclick="startMetronome()">▶ 시작 (3초 카운트다운)</button>
      <button class="btn-stop" onclick="stopMetronome()">■ 정지</button>
    </div>

    <!-- 멤버 전용 -->
    <div id="member-panel" style="display:none">
      <div class="member-notice">
        <div class="notice-icon">🎧</div>
        이어폰 꽂고 기다리세요!<br>방장이 시작하면 자동으로 동기화돼요.
      </div>
    </div>

    <!-- 딜레이 조절 (방장+멤버 모두) -->
    <div class="control-box">
      <div class="ctrl-top">
        <div class="ctrl-label">내 딜레이 조절</div>
        <div class="ctrl-readout muted" id="offset-readout">0 ms</div>
      </div>
      <div class="btn-row">
        <button class="ctrl-btn" onclick="changeOffset(-10)">−10</button>
        <button class="ctrl-btn" onclick="changeOffset(-1)">−1</button>
        <input type="range" id="offset-slider" min="-200" max="200" value="0" oninput="setOffsetSlider(this.value)">
        <button class="ctrl-btn" onclick="changeOffset(1)">+1</button>
        <button class="ctrl-btn" onclick="changeOffset(10)">+10</button>
      </div>
      <div class="offset-desc">
        소리가 늦게 들리면 ← 왼쪽 (-) / 너무 빠르면 → 오른쪽 (+)
      </div>
    </div>

    <div class="sync-status measuring" id="sync-status">⏱ 서버 시간 측정 중...</div>

    <div class="members-section">
      <div class="members-label">접속 중인 멤버</div>
      <div class="members-list" id="members-list"></div>
    </div>

    <button class="btn-leave" onclick="leaveRoom()">← 나가기</button>
  </div>

</div>

<div class="countdown-overlay" id="countdown-overlay">
  <div class="countdown-num" id="countdown-num">3</div>
</div>
<div class="toast" id="toast">복사됨!</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjExOj4c1VfxRpmrCWOMR69WCX7sr6HeI",
  authDomain: "band-click.firebaseapp.com",
  projectId: "band-click",
  storageBucket: "band-click.firebasestorage.app",
  messagingSenderId: "270186166321",
  appId: "1:270186166321:web:3b238b9c4ab43b56ddbd10",
  databaseURL: "https://band-click-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

const S = {
  myId: Math.random().toString(36).slice(2, 10),
  myName: '', isHost: false, roomCode: '',
  bpm: 120, timeSig: 4,
  isPlaying: false, currentBeat: 0,
  audioCtx: null, nextBeatTime: 0,
  schedulerTimer: null, beatFlashTimer: null,
  roomRef: null, unsubscribe: null,
  serverTimeOffset: 0,
  userOffsetMs: 0,        // 사용자 딜레이 조절값 (ms)
  prevStartAt: null, prevIsPlaying: false,
};

// ============================
// 서버 시간 5번 측정 → 중간값 평균
// ============================
async function syncServerTime() {
  const syncEl = document.getElementById('sync-status');
  if (syncEl) { syncEl.textContent = '⏱ 서버 시간 측정 중...'; syncEl.className = 'sync-status measuring'; }

  const samples = [];
  for (let i = 0; i < 5; i++) {
    await new Promise(resolve => {
      onValue(ref(db, '.info/serverTimeOffset'), snap => {
        samples.push(snap.val() || 0);
        resolve();
      }, { onlyOnce: true });
    });
    if (i < 4) await new Promise(r => setTimeout(r, 150));
  }

  // 정렬 후 극단값(최소,최대) 제거 → 중간 3개 평균
  samples.sort((a, b) => a - b);
  const mid = samples.slice(1, 4);
  S.serverTimeOffset = mid.reduce((a, b) => a + b, 0) / mid.length;

  if (syncEl) {
    syncEl.textContent = '✓ 서버 동기화 완료';
    syncEl.className = 'sync-status good';
  }
}

function serverNow() {
  return Date.now() + S.serverTimeOffset;
}

// ============================
// 오디오
// ============================
function getAudioCtx() {
  if (!S.audioCtx) S.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return S.audioCtx;
}

function scheduleClick(time, isDownbeat) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = isDownbeat ? 1800 : 1000;
  gain.gain.setValueAtTime(isDownbeat ? 0.7 : 0.4, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
  osc.start(time); osc.stop(time + 0.06);
}

function scheduler() {
  if (!S.isPlaying) return;
  const ctx = getAudioCtx();
  while (S.nextBeatTime < ctx.currentTime + 0.1) {
    const beat = S.currentBeat % S.timeSig;
    scheduleClick(S.nextBeatTime, beat === 0);
    const delay = (S.nextBeatTime - ctx.currentTime) * 1000;
    const b = beat;
    setTimeout(() => flashBeat(b), Math.max(0, delay));
    S.nextBeatTime += 60 / S.bpm;
    S.currentBeat++;
  }
}

function flashBeat(beat) {
  const circle = document.getElementById('beat-circle');
  const dots = document.querySelectorAll('.beat-dot');
  circle.classList.add('beat-on');
  if (beat === 0) circle.classList.add('downbeat');
  dots.forEach((d, i) => {
    d.classList.remove('active', 'downbeat');
    if (i === beat) { d.classList.add('active'); if (beat === 0) d.classList.add('downbeat'); }
  });
  clearTimeout(S.beatFlashTimer);
  S.beatFlashTimer = setTimeout(() => circle.classList.remove('beat-on', 'downbeat'), 80);
}

function startScheduler() { S.schedulerTimer = setInterval(scheduler, 25); }

function stopScheduler() {
  clearInterval(S.schedulerTimer); S.schedulerTimer = null;
  document.getElementById('beat-circle').classList.remove('beat-on', 'downbeat');
  document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active','downbeat'));
}

// ============================
// 카운트다운 + 시작
// userOffsetMs 적용: 양수면 늦게, 음수면 빠르게
// ============================
async function doCountdownAndStart(startAt) {
  const ctx = getAudioCtx();
  await ctx.resume();

  // userOffsetMs 반영: 음수면 앞당겨서 들음, 양수면 늦게 들음
  const adjustedStartAt = startAt - S.userOffsetMs;
  const msUntilStart = adjustedStartAt - serverNow();
  if (msUntilStart < -500) return;

  setStatus('countdown', '카운트다운...');
  const overlay = document.getElementById('countdown-overlay');
  const numEl = document.getElementById('countdown-num');
  overlay.classList.add('show');

  let count = Math.ceil((startAt - serverNow()) / 1000);
  numEl.textContent = count;
  numEl.style.animation = 'none'; void numEl.offsetHeight; numEl.style.animation = 'countScale 0.85s ease-out';

  const tick = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(tick);
      overlay.classList.remove('show');
      setStatus('running', '재생 중 🎵');
    } else {
      numEl.textContent = count;
      numEl.style.animation = 'none'; void numEl.offsetHeight; numEl.style.animation = 'countScale 0.85s ease-out';
    }
  }, 1000);

  const waitMs = adjustedStartAt - serverNow() - 30;
  await new Promise(r => setTimeout(r, Math.max(0, waitMs)));

  const audioNow = ctx.currentTime;
  const remainSec = Math.max(0, (adjustedStartAt - serverNow()) / 1000);
  S.nextBeatTime = audioNow + remainSec;
  S.currentBeat = 0;
  S.isPlaying = true;
  startScheduler();
}

function stopNow() {
  S.isPlaying = false;
  stopScheduler();
  setStatus('', '정지됨');
}

// ============================
// 방 생성/참가
// ============================
function generateCode() { return Math.random().toString(36).slice(2, 8).toUpperCase(); }

window.createRoom = async function() {
  const name = document.getElementById('input-name').value.trim();
  const roomName = document.getElementById('input-room-name').value.trim();
  if (!name) { alert('이름을 입력하세요!'); return; }
  if (!roomName) { alert('방 이름을 입력하세요!'); return; }

  const code = generateCode();
  S.myName = name; S.isHost = true; S.roomCode = code;

  await set(ref(db, 'rooms/' + code), { name: roomName, bpm: 120, timeSig: 4, isPlaying: false, startAt: null, createdAt: serverTimestamp() });
  await set(ref(db, `rooms/${code}/members/${S.myId}`), { name, isHost: true, joinedAt: serverTimestamp() });

  enterRoom(code, roomName, true);
  syncServerTime();
}

window.joinRoom = async function() {
  const name = document.getElementById('input-name').value.trim();
  const code = document.getElementById('input-room-code').value.trim().toUpperCase();
  if (!name) { alert('이름을 입력하세요!'); return; }
  if (!code) { alert('방 코드를 입력하세요!'); return; }

  const snap = await get(ref(db, 'rooms/' + code));
  if (!snap.exists()) { alert('방을 찾을 수 없어요!'); return; }

  const data = snap.val();
  S.myName = name; S.isHost = false; S.roomCode = code;

  await set(ref(db, `rooms/${code}/members/${S.myId}`), { name, isHost: false, joinedAt: serverTimestamp() });

  enterRoom(code, data.name, false);
  syncServerTime();
}

function enterRoom(code, roomName, isHost) {
  document.getElementById('screen-lobby').classList.remove('active');
  document.getElementById('screen-room').classList.add('active');
  document.getElementById('display-room-name').textContent = roomName;
  document.getElementById('display-room-code').textContent = code;
  document.getElementById('display-role-badge').textContent = isHost ? '방장' : '멤버';
  document.getElementById('display-role-badge').className = 'role-badge ' + (isHost ? 'role-host' : 'role-member');
  document.getElementById('host-panel').style.display = isHost ? 'block' : 'none';
  document.getElementById('member-panel').style.display = isHost ? 'none' : 'block';
  renderBeatDots(4);
  setStatus('', '대기 중...');
  S.roomRef = ref(db, 'rooms/' + code);
  S.prevStartAt = null; S.prevIsPlaying = false;

  S.unsubscribe = onValue(S.roomRef, snap => {
    if (!snap.exists()) return;
    const d = snap.val();

    if (d.bpm && d.bpm !== S.bpm) {
      S.bpm = d.bpm;
      document.getElementById('bpm-display').textContent = d.bpm;
      document.getElementById('bpm-readout').textContent = d.bpm + ' BPM';
      const sl = document.getElementById('bpm-slider'); if (sl) sl.value = d.bpm;
    }
    if (d.timeSig && d.timeSig !== S.timeSig) {
      S.timeSig = d.timeSig;
      renderBeatDots(d.timeSig);
      document.querySelectorAll('.ts-btn').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('ts-' + d.timeSig); if (btn) btn.classList.add('active');
    }
    if (d.members) renderMembers(d.members);

    if (!isHost && d.isPlaying && d.startAt && d.startAt !== S.prevStartAt && !S.isPlaying) {
      S.prevStartAt = d.startAt;
      doCountdownAndStart(d.startAt);
    }
    if (!isHost && !d.isPlaying && S.prevIsPlaying && S.isPlaying) stopNow();
    S.prevIsPlaying = d.isPlaying;
  });
}

window.startMetronome = async function() {
  if (S.isPlaying) return;
  const startAt = serverNow() + 3200;
  await update(S.roomRef, { isPlaying: true, startAt, bpm: S.bpm, timeSig: S.timeSig });
  doCountdownAndStart(startAt);
}

window.stopMetronome = async function() {
  await update(S.roomRef, { isPlaying: false, startAt: null });
  stopNow();
}

window.leaveRoom = async function() {
  if (S.unsubscribe) S.unsubscribe();
  stopNow();
  await remove(ref(db, `rooms/${S.roomCode}/members/${S.myId}`));
  S.roomCode = '';
  document.getElementById('screen-room').classList.remove('active');
  document.getElementById('screen-lobby').classList.add('active');
}

// ============================
// BPM / 박자
// ============================
window.changeBpm = function(d) {
  S.bpm = Math.min(240, Math.max(40, S.bpm + d));
  document.getElementById('bpm-display').textContent = S.bpm;
  document.getElementById('bpm-readout').textContent = S.bpm + ' BPM';
  document.getElementById('bpm-slider').value = S.bpm;
  if (S.roomRef) update(S.roomRef, { bpm: S.bpm });
}

window.setBpmSlider = function(val) {
  S.bpm = parseInt(val);
  document.getElementById('bpm-display').textContent = S.bpm;
  document.getElementById('bpm-readout').textContent = S.bpm + ' BPM';
  if (S.roomRef) update(S.roomRef, { bpm: S.bpm });
}

window.setTimeSig = function(n) {
  S.timeSig = n;
  renderBeatDots(n);
  document.querySelectorAll('.ts-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('ts-' + n).classList.add('active');
  if (S.roomRef) update(S.roomRef, { timeSig: n });
}

// ============================
// 딜레이 오프셋 조절
// ============================
window.changeOffset = function(delta) {
  S.userOffsetMs = Math.min(200, Math.max(-200, S.userOffsetMs + delta));
  updateOffsetDisplay();
}

window.setOffsetSlider = function(val) {
  S.userOffsetMs = parseInt(val);
  updateOffsetDisplay();
}

function updateOffsetDisplay() {
  const el = document.getElementById('offset-readout');
  const sl = document.getElementById('offset-slider');
  sl.value = S.userOffsetMs;
  if (S.userOffsetMs < 0) {
    el.textContent = S.userOffsetMs + ' ms';
    el.className = 'ctrl-readout blue';
  } else if (S.userOffsetMs > 0) {
    el.textContent = '+' + S.userOffsetMs + ' ms';
    el.className = 'ctrl-readout orange';
  } else {
    el.textContent = '0 ms';
    el.className = 'ctrl-readout muted';
  }
}

// ============================
// UI 헬퍼
// ============================
window.copyCode = function() {
  navigator.clipboard.writeText(S.roomCode).catch(() => {});
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function renderBeatDots(n) {
  const c = document.getElementById('beat-dots'); c.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'beat-dot' + (i === 0 ? ' downbeat' : '');
    c.appendChild(d);
  }
}

function renderMembers(members) {
  const list = document.getElementById('members-list'); list.innerHTML = '';
  Object.values(members).forEach(m => {
    const chip = document.createElement('div');
    chip.className = 'member-chip';
    chip.innerHTML = `<div class="member-dot"></div>${m.name}${m.isHost ? ' 👑' : ''}`;
    list.appendChild(chip);
  });
}

function setStatus(type, text) {
  document.getElementById('status-dot').className = 'status-dot ' + type;
  document.getElementById('status-text').textContent = text;
}

renderBeatDots(4);
</script>
</body>
</html>
